<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">

    <title>160班照片查询系统</title>

    <style>
        body {
            background: linear-gradient(135deg, #6dd5ed, #2193b0);
            font-family: Arial;
            text-align: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        input {
            padding: 12px;
            font-size: 18px;
            border-radius: 8px;
            border: 1px solid #ccc;
            width: 200px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background: #2193b0;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #176d85;
        }
    </style>

</head>


<body>

    <div class="box">

        <h2>160班班长大人的查询确认系统</h2>

        <p>请输入身份证后六位</p>

        <form action="/search" method="post">

            <input type="text" name="id" maxlength="6" required>

            <br><br>

            <button type="submit">查询</button>

        </form>

    </div>

</body>

</html>
